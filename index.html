function getTags(item) {

function Highlight({ text, query }) {
  if (!query) return <>{text}</>;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const parts = text.split(new RegExp(`(${escaped})`, 'gi'));
  return <>{parts.map((p, i) =>
    p.toLowerCase() === query.toLowerCase()
      ? <mark key={i} style={{ background: '#fef08a', borderRadius: 2, padding: '0 1px' }}>{p}</mark>
      : p
  )}</>;
}

        <div style={{
          width: 30, height: 30, borderRadius: '50%',
          background: c + '18', color: c,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontWeight: 800, fontSize: 13, flexShrink: 0, marginTop: 1
        }}>{item.index}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: '#0f172a', marginBottom: 3 }}>
            <Highlight text={item.subject} query={query} />
          </div>
          <div style={{ fontSize: 12, color: '#64748b', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            <Highlight text={item.source} query={query} />
          </div>
        </div>
        <span style={{ color: '#c4cdd6', fontSize: 12, flexShrink: 0, marginTop: 3 }}>
          {open ? '▲' : '▼'}
        </span>
      </div>
      {open && (
        <div style={{ padding: '14px 18px' }}>
          <div style={{ fontSize: 14, lineHeight: 1.9, color: '#334155', marginBottom: tags.length > 0 ? 12 : 0 }}>
            <Highlight text={item.summary} query={query} />
          </div>
          {tags.length > 0 && (
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {tags.map((tag, i) => (
                <span key={i} style={{
                  fontSize: 11, fontWeight: 600, color: c,
                  background: c + '12', borderRadius: 20,
                  padding: '3px 9px', letterSpacing: 0.3
                }}>{tag}</span>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── 검색 결과 ─────────────────────────────────
function SearchResults({ query, data }) {
  const results = [];
  for (const digest of data) {
    for (const item of digest.items) {
      const text = `${item.source} ${item.subject} ${item.summary}`;
      if (text.toLowerCase().includes(query.toLowerCase())) {
        results.push({ ...item, date: digest.date });
      }
    }
  }
  if (results.length === 0) {
    return (
      <div style={{ textAlign: 'center', padding: '60px 0' }}>
        <div style={{ fontSize: 36, marginBottom: 12 }}>🔍</div>
        <div style={{ fontSize: 14, color: '#64748b', fontWeight: 600, marginBottom: 6 }}>
          "{query}" 검색 결과 없음
        </div>
        <div style={{ fontSize: 13, color: '#94a3b8' }}>다른 키워드로 검색해보세요.</div>
      </div>
    );
  }
  return (
    <div>
      <div style={{ fontSize: 13, color: '#64748b', marginBottom: 20 }}>
        <span style={{ fontWeight: 700, color: '#0f172a' }}>"{query}"</span> 검색 결과 {results.length}건
      </div>
      {results.map((item, i) => (
        <div key={i}>
          <div style={{
            fontSize: 11, color: '#94a3b8', fontWeight: 700, letterSpacing: 0.5,
            marginBottom: 6, marginTop: i > 0 ? 6 : 0
          }}>
            📅 {fmtDate(item.date)}
          </div>
          <Card item={item} idx={i} query={query} />
        </div>
      ))}
    </div>
  );
}

// ── 날짜별 다이제스트 ──────────────────────────
// SVG 아이콘 컴포넌트
function ChevronLeft({ size = 22, color = '#fff' }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
}
function ChevronRight({ size = 22, color = '#fff' }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 6 15 12 9 18"/></svg>;
}
function CalendarIcon({ size = 20, color = '#fff' }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><rect x="8" y="14" width="2" height="2" fill={color} stroke="none"/><rect x="14" y="14" width="2" height="2" fill={color} stroke="none"/></svg>;
}

function DigestPage({ digest, tab, onPrev, onNext, hasPrev, hasNext,
  calOpen, setCalOpen, calRef, cm, setCalMonth, buildCal, fmtISO, dates, activeDate, setSelDate }) {
  const grad = tab === 'AI'
    ? 'linear-gradient(135deg, #1a2060 0%, #2d4aaa 100%)'
    : tab === '마케팅'
    ? 'linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%)'
    : tab === '부동산'
    ? 'linear-gradient(135deg, #7c2d12 0%, #c2410c 100%)'
    : 'linear-gradient(135deg, #064e3b 0%, #065f46 60%, #047857 100%)';
  const label = tab === 'AI' ? 'DAILY AI DIGEST' : tab === '마케팅' ? 'DAILY MARKETING DIGEST' : tab === '부동산' ? 'DAILY REALESTATE DIGEST' : 'DAILY ECONOMY DIGEST';
  const unit  = '인사이트';

  const navBtnStyle = (disabled) => ({
    width: 40, height: 40, borderRadius: 10,
    background: disabled ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.15)',
    border: 'none',
    cursor: disabled ? 'default' : 'pointer',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    transition: 'all 0.15s', opacity: disabled ? 0.3 : 1,
    flexShrink: 0
  });

  const calBtnStyle = {
    width: 40, height: 40, borderRadius: 10,
    background: calOpen ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.15)',
    border: 'none', cursor: 'pointer',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    transition: 'all 0.15s', flexShrink: 0
  };

  return (
    <div style={{ position: 'relative' }} ref={calRef}>
      <div style={{
        background: grad, borderRadius: 16,
        padding: '18px 14px', marginBottom: 24,
        display: 'flex', alignItems: 'center', gap: 8
      }}>
        {/* 좌측 화살표 */}
        <button style={navBtnStyle(!hasPrev)} onClick={hasPrev ? onPrev : undefined} title="이전 날짜">
          <ChevronLeft size={22} color="#fff" />
        </button>

        {/* 중앙: 라벨 + 날짜 */}
        <div style={{ flex: 1, textAlign: 'center', minWidth: 0 }}>
          <div style={{ color: '#fff', fontSize: 20, fontWeight: 700 }}>
            {fmtDate(digest.date)}
          </div>
        </div>

        {/* 우측 화살표 */}
        <button style={navBtnStyle(!hasNext)} onClick={hasNext ? onNext : undefined} title="다음 날짜">
          <ChevronRight size={22} color="#fff" />
        </button>

        {/* 달력 버튼 */}
        <button style={calBtnStyle} onClick={() => setCalOpen(!calOpen)} title="달력에서 날짜 선택">
          <CalendarIcon size={20} color="#fff" />
        </button>

        {/* 인사이트 수 */}
        <div style={{
          background: 'rgba(255,255,255,0.15)', borderRadius: 10,
          padding: '8px 16px', textAlign: 'center', flexShrink: 0
        }}>
          <div style={{ color: '#fff', fontSize: 24, fontWeight: 800, lineHeight: 1.1 }}>{digest.items.length}</div>
          <div style={{ color: '#bfdbfe', fontSize: 11 }}>{unit}</div>
        </div>
      </div>

      {/* 달력 팝업 */}
      {calOpen && (
        <div style={{
          position: 'absolute', top: 80, right: 0, zIndex: 100,
          background: '#fff', borderRadius: 14, padding: 16,
          boxShadow: '0 8px 30px rgba(0,0,0,0.18)',
          border: '1px solid #e2e8f0', minWidth: 280
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <button onClick={() => setCalMonth({ y: cm.m === 0 ? cm.y - 1 : cm.y, m: cm.m === 0 ? 11 : cm.m - 1 })}
              style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '4px 8px', display: 'flex' }}>
              <ChevronLeft size={18} color="#475569" />
            </button>
            <div style={{ fontSize: 14, fontWeight: 700, color: '#0f172a' }}>{cm.y}년 {cm.m + 1}월</div>
            <button onClick={() => setCalMonth({ y: cm.m === 11 ? cm.y + 1 : cm.y, m: cm.m === 11 ? 0 : cm.m + 1 })}
              style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '4px 8px', display: 'flex' }}>
              <ChevronRight size={18} color="#475569" />
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2, marginBottom: 4 }}>
            {['일','월','화','수','목','금','토'].map(w => (
              <div key={w} style={{ textAlign: 'center', fontSize: 11, fontWeight: 700, color: '#94a3b8', padding: 4 }}>{w}</div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2 }}>
            {buildCal(cm.y, cm.m).map((day, i) => {
              if (!day) return <div key={'e'+i} />;
              const iso = fmtISO(cm.y, cm.m, day);
              const hasData = dates.includes(iso);
              const isActive = iso === activeDate;
              return (
                <button key={i} onClick={() => { if (hasData) { setSelDate(iso); setCalOpen(false); } }}
                  style={{
                    width: 34, height: 34, borderRadius: 8, fontSize: 13, fontWeight: 600,
                    border: isActive ? '2px solid #1e3a5f' : '1px solid transparent',
                    background: isActive ? '#1e3a5f' : hasData ? '#f0f7ff' : 'transparent',
                    color: isActive ? '#fff' : hasData ? '#1e3a5f' : '#cbd5e1',
                    cursor: hasData ? 'pointer' : 'default',
                    transition: 'all 0.1s',
                    display: 'flex', alignItems: 'center', justifyContent: 'center'
                  }}
                >{day}</button>
              );
            })}
          </div>
        </div>
      )}

      <div style={{ marginBottom: 8 }}>
        {digest.items.length === 0
          ? <div style={{ textAlign: 'center', color: '#94a3b8', padding: '40px 0', fontSize: 14 }}>
              이 날에는 관련 내용이 없었습니다.
            </div>
          : digest.items.map((item, i) => <Card key={i} item={item} idx={i} />)
        }
      </div>

      {digest.noList && digest.noList.length > 0 && (
        <div style={{
          background: '#f8fafc', borderRadius: 12,
          border: '1px dashed #cbd5e1', padding: '14px 18px', marginTop: 4
        }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: '#94a3b8', marginBottom: 8, letterSpacing: 0.5 }}>
            오늘 관련 내용 없었던 뉴스레터
          </div>
          {digest.noList.map((n, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: '#64748b', padding: '3px 0' }}>
              <span style={{ color: '#cbd5e1' }}>—</span> {n}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── 빈 상태 ───────────────────────────────────
function EmptyState({ tab }) {
  return (
    <div style={{ textAlign: 'center', padding: '60px 0', color: '#94a3b8' }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>{tab === 'AI' ? '🤖' : tab === '마케팅' ? '📊' : tab === '부동산' ? '🏠' : '💰'}</div>
      <div style={{ fontSize: 15, fontWeight: 600, color: '#64748b', marginBottom: 8 }}>
        {tab} 뉴스레터 준비 중
      </div>
      <div style={{ fontSize: 13, lineHeight: 1.9 }}>
        스케줄이 실행되면 자동으로 내용이 채워집니다.
      </div>
    </div>
  );
}

// ── 앱 ───────────────────────────────────────
function App() {
  const [tab, setTab]             = useState('AI');
  const [selDate, setSelDate]     = useState(null);
  const [inputVal, setInputVal]   = useState('');
  const [searchQuery, setSearch]  = useState('');
  const [calOpen, setCalOpen]     = useState(false);
  const [calMonth, setCalMonth]   = useState(null);
  const inputRef = useRef(null);
  const calRef   = useRef(null);

  const list       = tab === 'AI' ? AI_DATA : tab === '마케팅' ? MARKETING_DATA : tab === '부동산' ? REALESTATE_DATA : ECONOMY_DATA;
  const dates      = list.map(d => d.date);
  const activeDate = selDate && dates.includes(selDate) ? selDate : dates[0];
  const digest     = list.find(d => d.date === activeDate);
  const isSearch   = searchQuery.trim().length > 0;

  useEffect(() => { setInputVal(''); setSearch(''); }, [tab]);

  // 달력 외부 클릭 시 닫기
  useEffect(() => {
    function handleClick(e) {
      if (calRef.current && !calRef.current.contains(e.target)) setCalOpen(false);
    }
    if (calOpen) document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, [calOpen]);

  // 달력 표시 월 초기화
  useEffect(() => {
    if (calOpen && activeDate) {
      const d = new Date(activeDate + 'T12:00:00');
      setCalMonth({ y: d.getFullYear(), m: d.getMonth() });
    }
  }, [calOpen]);

  function doSearch() {
    const q = inputVal.trim();
    if (q) setSearch(q);
  }

  function clearSearch() {
    setInputVal('');
    setSearch('');
    if (inputRef.current) inputRef.current.focus();
  }

  function goPrev() {
    const idx = dates.indexOf(activeDate);
    if (idx < dates.length - 1) setSelDate(dates[idx + 1]);
  }
  function goNext() {
    const idx = dates.indexOf(activeDate);
    if (idx > 0) setSelDate(dates[idx - 1]);
  }

  // 탭 버튼 스타일
  const tabStyle = (key) => ({
    padding: '7px 16px', borderRadius: 8, fontSize: 13, fontWeight: 600,
    border: tab === key ? '2px solid #1e3a5f' : '2px solid #e2e8f0',
    background: tab === key ? '#1e3a5f' : '#fff',
    color: tab === key ? '#fff' : '#64748b',
    cursor: 'pointer', transition: 'all 0.15s', whiteSpace: 'nowrap'
  });

  // 달력 헬퍼
  function buildCal(y, m) {
    const first = new Date(y, m, 1);
    const lastDay = new Date(y, m + 1, 0).getDate();
    const startDow = first.getDay();
    const cells = [];
    for (let i = 0; i < startDow; i++) cells.push(null);
    for (let d = 1; d <= lastDay; d++) cells.push(d);
    return cells;
  }

  function fmtISO(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  const cm = calMonth || (() => { const d = new Date((activeDate || dates[0] || '2026-03-23') + 'T12:00:00'); return { y: d.getFullYear(), m: d.getMonth() }; })();

  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '32px 16px' }}>

      {/* ── 상단: 제목 + 검색 ── */}
      <div style={{
        display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
        marginBottom: 12, flexWrap: 'wrap', gap: 12
      }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#94a3b8', letterSpacing: 1.5, marginBottom: 2 }}>
            NEWSLETTER DIGEST
          </div>
          <div style={{ fontSize: 22, fontWeight: 800, color: '#0f172a' }}>뉴스레터 다이제스트</div>
        </div>

        {/* 검색창 */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <div style={{ position: 'relative' }}>
            <input
              ref={inputRef}
              value={inputVal}
              onChange={e => setInputVal(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && doSearch()}
              placeholder="키워드 검색..."
              style={{
                height: 34, paddingLeft: 12, paddingRight: inputVal ? 26 : 12,
                borderRadius: 8, border: '2px solid #e2e8f0',
                fontSize: 13, color: '#0f172a', outline: 'none',
                width: 150, fontFamily: 'inherit', transition: 'border 0.15s'
              }}
              onFocus={e => e.currentTarget.style.borderColor = '#1e3a5f'}
              onBlur={e => e.currentTarget.style.borderColor = '#e2e8f0'}
            />
            {inputVal && (
              <button
                onClick={clearSearch}
                style={{
                  position: 'absolute', right: 7, top: '50%', transform: 'translateY(-50%)',
                  background: 'none', border: 'none', cursor: 'pointer',
                  color: '#94a3b8', fontSize: 15, padding: 0, lineHeight: 1
                }}
              >×</button>
            )}
          </div>
          <button
            onClick={doSearch}
            style={{
              height: 34, width: 34, borderRadius: 8,
              border: '2px solid #e2e8f0', background: '#fff',
              cursor: 'pointer', fontSize: 15,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              transition: 'all 0.15s'
            }}
            onMouseEnter={e => { e.currentTarget.style.background = '#1e3a5f'; e.currentTarget.style.borderColor = '#1e3a5f'; }}
            onMouseLeave={e => { e.currentTarget.style.background = '#fff'; e.currentTarget.style.borderColor = '#e2e8f0'; }}
          >🔍</button>
        </div>
      </div>

      {/* ── 탭 버튼 (제목 아래 별도 줄) ── */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 20 }}>
        <button style={tabStyle('AI')}    onClick={() => setTab('AI')}>🤖 AI</button>
        <button style={tabStyle('마케팅')} onClick={() => setTab('마케팅')}>📊 마케팅</button>
        <button style={tabStyle('경제')}  onClick={() => setTab('경제')}>💰 경제</button>
        <button style={tabStyle('부동산')} onClick={() => setTab('부동산')}>🏠 부동산</button>
      </div>

      {/* ── 콘텐츠 ── */}
      {isSearch
        ? <SearchResults query={searchQuery} data={list} />
        : (digest ? <DigestPage digest={digest} tab={tab} onPrev={goPrev} onNext={goNext}
            hasPrev={dates.indexOf(activeDate) < dates.length - 1}
            hasNext={dates.indexOf(activeDate) > 0}
            calOpen={calOpen} setCalOpen={setCalOpen} calRef={calRef}
            cm={cm} setCalMonth={setCalMonth} buildCal={buildCal} fmtISO={fmtISO}
            dates={dates} activeDate={activeDate} setSelDate={setSelDate}
          /> : <EmptyState tab={tab} />)
      }

      <div style={{ textAlign: 'center', marginTop: 36, fontSize: 12, color: '#cbd5e1' }}>
        자동 수집 · 요약 by Claude
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
